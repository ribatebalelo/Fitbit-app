<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitBit Gym | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="app-bg">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-fitbit border-bottom border-fitbit">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="./index.html">
          <span class="brand-mark">FB</span>
          FitBit Gym
        </a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-fitbit btn-sm" href="./register.html">Register</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card card-fitbit shadow-lg">
            <div class="card-body p-4 p-lg-5">
              <h1 class="h3 fw-bold text-white mb-1">Welcome back</h1>
              <p class="text-white-50 mb-4">Login to your member dashboard.</p>

              <div id="alertHost"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label class="form-label text-white-50" for="email">Email</label>
                  <input class="form-control form-control-fitbit" id="email" type="email" autocomplete="email" required />
                  <div class="invalid-feedback">Please enter a valid email.</div>
                </div>
                <div class="mb-3">
                  <label class="form-label text-white-50" for="password">Password</label>
                  <input class="form-control form-control-fitbit" id="password" type="password" autocomplete="current-password" minlength="4" required />
                  <div class="invalid-feedback">Password is required.</div>
                </div>

                <div class="d-grid gap-2">
                  <button class="btn btn-fitbit btn-lg" type="submit">Login</button>
                  <a class="btn btn-outline-fitbit" href="./register.html">Create new account</a>
                </div>

                <hr class="border-fitbit my-4" />

                <div class="text-white-50 small">
                  Admin demo: <span class="text-white">admin@fitbitgym.local</span> / <span class="text-white">admin123</span>.
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script>
      window.FitBitApp?.bootstrap?.();
      window.FitBitApp?.pages?.login?.();
    </script>
  </body>
</html>
